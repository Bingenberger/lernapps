<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rechenrahmen</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div>
          <h1>Rechenrahmen</h1>
          <p>Mengenbilder und Zahlvorstellung bis 20</p>
        </div>
        <div class="header-actions">
          <a class="secondary link-btn" href="../index.html">Zum Portal</a>
        </div>
      </header>

      <main class="rechenrahmen-layout">
        <section class="panel rechenrahmen-panel">
          <div class="menu">
            <button id="btn-normal" class="active" data-mode="normal">Freies Schieben</button>
            <button id="btn-hide" data-mode="hide">Zahl verstecken</button>
            <button id="btn-target" data-mode="target">Zahl einstellen</button>
            <button id="btn-blitz" data-mode="blitz">Blitzblick</button>
          </div>

          <div class="frame" aria-label="Rechenrahmen">
            <div class="rod-container" id="rod-upper"></div>
            <div class="rod-container" id="rod-lower"></div>
          </div>

          <div class="display-area">
            <div id="target-display" class="target-box" hidden>
              Stelle die Zahl ein: <span id="target-num">5</span>
            </div>
            <div id="blitz-display" class="target-box" hidden>
              <span id="blitz-prompt">Merke dir die Zahl!</span>
            </div>
            <div id="blitz-speed" class="blitz-speed" hidden>
              <span>Anzeigezeit:</span>
              <button type="button" class="active" data-blitz-ms="1500">1,5 s</button>
              <button type="button" data-blitz-ms="2000">2,0 s</button>
              <button type="button" data-blitz-ms="3000">3,0 s</button>
            </div>
            <div id="counter" class="counter-box"><span>0</span></div>
            <div id="blitz-answer-grid" class="blitz-grid" hidden></div>
            <div id="feedback" class="success-msg"></div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
